<!doctype html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Weather for City of Franklin</title>
        <meta name="author" content="Paula Spitale">
        <meta name="description" content="Weather conditions for the city of Franklin">
        <!-- external style references in the proper cascading order -->    
        <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700" rel="stylesheet">  <!-- Google API font reference -->
        <link href="css/normalize.css" rel="stylesheet"> <!-- normalize useragent/browser defaults -->
        <link href="css/small-8.css" rel="stylesheet">    <!-- default styles - small/phone views -->
        <link href="css/medium-8.css" rel="stylesheet">  <!-- medium/tablet views -->
        <link href="css/large-8.css" rel="stylesheet">   <!-- large/wide/desktop views --> 
    </head>
    
    <body>

        <header class="clearfix">
            <figure>
                <img src="images/weather-vane-wind-sky-north-pixrl-180.jpg" alt="The site logo">
            </figure>
            <h1>Easy Weather</h1>
            <div class="subheading">Weather made easy</div>
        </header>

        <!-- site navigation use placeholder references -->
  
        <nav class="clearfix">
            <button onclick="toggleNavMenu()">&#9776;</button>
                <ul id="primaryNav" class="hide">
    	           <li><a href="#">Home</a></li>
    	           <li><a href="index.html">Franklin</a></li>
    	           <li><a href="#">Greenville</a></li>
    	           <li><a href="#">Springfield</a></li>
    	           <li class="active"><a href="stormcenter.html">Storm Center</a></li>
    	           <li><a href="gallery.html">Gallery</a></li>
                </ul>		
        </nav>
    
        <main>
            
            <form action="thanks.html" method="get" enctype="multipart/form-data" name="stormCenter" id="storm">
            
            <fieldset>
        <legend><span>Personal Information</span></legend>
	<label><span>Full Name (required)</span><input name="fullname" type="text" value="" placeholder="Full Name" pattern="[a-zA-Z -._]{5,99}" required></label>
	
	<label><span>Email:</span><input name="email" type="email" value="" placeholder="myemail@email.com"></label>
	
	<label><span>Phone (required)</span><input name="phone" type="tel" value="" placeholder="1235551234" pattern="[0-9]{10,20}" required></label>
                
    <label><span>Zip Code (required)</span><input name="zipcode" type="number" placeholder="12345" required></label>
	       </fieldset>   
            
            <fieldset>
	<legend><span>Tell us about your Storm</span></legend>
	<label><span>Storm Date:</span><input name="date" type="date"></label>
    <label>
        <span>Storm Type:</span>
        <input type="text" name="Stormtyp" list="stormType">
        <datalist id="stormType">
            <option value="Flash Flood"></option>
            <option value="Hail"></option>
            <option value="Hurricane"></option>
            <option value="Thunderstorm"></option>
            <option value="Tornado"></option>
        </datalist>
	</label>
    <label><span>How severe is the Storm? (1 to 10):</span><input name="severity" type="range"  value="5" min="1" max="10" id="rating" oninput="adjustRating(this.value)" onchange="adjustRating(this.value)"><span id="ratingvalue">1</span></label>
                
    <label><span>Storm Region:</span>
        <select name="region">
        <option value="" disabled>Select Region...</option>
        <option value="Franklin">Franklin</option>
        <option value="Greenville">Greenville</option>
        <option value="Springfield">Springfield</option>
        </select>
        </label>
                
    <label><span>Are you in danger?</span></label>
     <label><input name="dangerlevel" type="radio" value="yes">Yes</label>
     <label><input name="dangerlevel" type="radio" value="maybe">Maybe</label>
     <label><input name="dangerlevel" type="radio" value="no">No</label>
        
                
    <label><span>Additional Information or Comments:</span><textarea name="comments" rows="10" cols="60"></textarea></label>
	       </fieldset>
            
    <input type="submit" value="Submit" class="submitBtn">
    <input name="redirect" type="hidden" value="thanks.html">
                
            </form>
        </main>
    
    <footer>
        <aside>
            Easy Weather
            <br>
            123 Main St.
            <br>
            (123)456-7890
            <br>
            contact@theurl.com
        </aside>
        <p class="footer-bar">&copy;2018 All Rights Reserved | Easy Weather | <span id="currentdate"></span></p>
    </footer>

    <script src="scripts/hamburger.js"></script>
    <script src="scripts/currentdate.js"></script>
    <script src="scripts/windchill.js"></script>
    <script src="scripts/adjustrating.js"></script>
</body>
</html>
